<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Bienes</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            text-align: center;
        }

        .login-header h2 {
            color: white;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
        }

        .login-body {
            padding: 35px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            background: #fdecea;
            padding: 10px;
            border-radius: 8px;
        }

        .info {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .info p {
            font-size: 12px;
            color: #666;
        }

        .info strong {
            color: #667eea;
            font-weight: 600;
        }

        .icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">🏢</div>
            <h2>Sistema de Gestión de Bienes</h2>
            <p>Control patrimonial eficiente</p>
        </div>

        <div class="login-body">
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">👤 Usuario</label>
                    <input type="text" id="username" placeholder="Ingrese su usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit">Iniciar Sesión</button>
                <p id="errorMsg" class="error"></p>
            </form>

            <div class="info">
                <p>📝 <strong>Credenciales de prueba</strong><br>
                    👑 admin / admin123<br>
                    👤 usuario / usuario123</p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000";

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            const errorMsg = document.getElementById("errorMsg");
            errorMsg.textContent = "";

            if (!username || !password) {
                errorMsg.textContent = "❌ Complete todos los campos";
                return;
            }

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const resultado = await response.json();

                if (resultado.ok) {
                    localStorage.setItem("sesion_activa", "true");
                    localStorage.setItem("username", username);
                    localStorage.setItem("usuario", JSON.stringify(resultado.usuario));
                    window.location.href = "index.html";
                } else {
                    errorMsg.textContent = "❌ " + resultado.mensaje;
                }
            } catch (error) {
                errorMsg.textContent = "❌ Error al conectar con el servidor. ¿El backend está corriendo?";
                console.error(error);
            }
        });
    </script>
</body>

</html>
